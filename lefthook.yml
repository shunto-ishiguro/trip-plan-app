pre-commit:
  parallel: true
  commands:
    biome:
      root: apps/mobile/
      glob: "apps/mobile/**/*.{js,jsx,ts,tsx,json,css}"
      run: npx biome check --write {staged_files}
      stage_fixed: true
    gofmt:
      glob: "*.go"
      run: gofmt -l -w {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    biome-check:
      run: cd apps/mobile && npx biome check .
    go-build:
      run: cd apps/api && go build ./...
